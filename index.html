<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Group Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        /* Memaksa elemen agar selalu terlihat */
        html, body { height: 100%; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        
        #nameOverlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; background: #075e54; 
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: white; 
        }

        header { background: #075e54; color: white; padding: 15px; text-align: center; flex-shrink: 0; font-weight: bold; }
        
        #terminal { flex: 1; overflow-y: auto; background: #e5ddd5; padding: 15px; display: block; }
        
        .footer { 
            background: #f0f0f0; padding: 15px; display: flex; gap: 10px; 
            border-top: 1px solid #ccc; flex-shrink: 0;
        }
        
        input#msg { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #128c7e; color: white; }
    </style>
</head>
<body>

<div id="nameOverlay">
    <h2>Masuk ke Grup</h2>
    <input type="text" id="nameInput" placeholder="Nama Anda" style="padding:10px; margin-bottom:10px; border-radius:5px; border:none; width:80%;">
    <button onclick="setName()">MASUK</button>
</div>

<header>
    <span style="color:#4CAF50">●</span> <span id="userCount">1</span> Online
</header>

<div id="terminal"></div>

<div class="footer">
    <input type="text" id="msg" placeholder="Ketik pesan...">
    <button onclick="sendMsg()">Kirim</button>
</div>

<script>
    // Memastikan skrip tetap berjalan
    let myName = "";
    
    function setName() {
        const val = document.getElementById('nameInput').value;
        if(val) {
            myName = val;
            document.getElementById('nameOverlay').style.display = 'none';
        }
    }

    function sendMsg() {
        const input = document.getElementById('msg');
        if(input.value && myName) {
            const div = document.createElement('div');
            div.style.margin = "5px 0";
            div.innerHTML = `<b>${myName}:</b> ${input.value}`;
            document.getElementById('terminal').appendChild(div);
            input.value = '';
        }
    }
</script>
</body>
</html>
